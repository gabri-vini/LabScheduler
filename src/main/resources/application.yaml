spring:
  application:
    name: LabSchedule
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: jdbc:mysql://${DB_URL}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone=BRT
application:
  jwt:
    secret: ${JWT_SECRET}
  apis:
    mailgun:
      key: ${MAILGUN_KEY}
  emails:
    domain: ${EMAIL_APPLICATION_DOMAIN}
    from: Lab Scheduler <noreply@${EMAIL_APPLICATION_DOMAIN}>
  extern:
    frontend-ip: http://127.0.0.1:5500
