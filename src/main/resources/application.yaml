spring:
  application:
    name: LabSchedule
  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: jdbc:mysql://${DB_URL}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time_zone=BRT
application:
  jwt:
    secret: ${JWT_SECRET}
  apis:
    mailgun:
      key: ${MAILGUN_KEY}
  emails:
    domain: ${EMAIL_APPLICATION_DOMAIN}
    from: Lab Scheduler <noreply@${EMAIL_APPLICATION_DOMAIN}>
  extern:
    frontend-address: ${FRONTEND_ADDRESS}
  classes:
    periods:
      MORNING:
        start-at: "07:05:00"
        end-at: "12:20:00"
      AFTERNOON:
        start-at: "13:00:00"
        end-at: "18:15:00"
      EVENING:
        start-at: "18:35:00"
        end-at: "23:00:00"
    classes-before-breaktime: 3
    breaktime-duration-minutes: 15
    class-duration-minutes: 50
